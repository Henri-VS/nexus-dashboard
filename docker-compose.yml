# Nexus Dashboard — build from source (developer use)
# ────────────────────────────────────────────────────
# For regular use, see docker-compose-hub.yml (pre-built images, no cloning needed).
#
# Build and run:
#   docker compose up --build -d
#
# After building, push to Docker Hub:
#   docker push henrivs/nexus-frontend:latest
#   docker push henrivs/nexus-backend:latest

services:

  frontend:
    image: henrivs/nexus-frontend:latest   # tagged automatically on build
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_URL=http://${HOST_IP:-localhost}:8088
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus

  backend:
    image: henrivs/nexus-backend:latest    # tagged automatically on build
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8088:8000"
    env_file:
      - .env
    environment:
      - DOCKER_HOST=tcp://dockerproxy:2375
    volumes:
      - ./data:/app/data
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault:ro
    depends_on:
      - dockerproxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - nexus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      VOLUMES: 1
      POST: 0
      DELETE: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nexus
    restart: unless-stopped

  excalidraw:
    image: excalidraw/excalidraw:latest
    ports:
      - "3002:80"
    restart: unless-stopped
    networks:
      - nexus

networks:
  nexus:
    driver: bridge
