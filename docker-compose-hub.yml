# Nexus Dashboard — pre-built images (no source code needed)
# ──────────────────────────────────────────────────────────
# Quickstart:
#   Linux/Mac:  ./start.sh
#   Windows:    .\start.ps1
#
# Manual:
#   1. Copy .env.example to .env and edit it
#   2. Set HOST_IP= in .env to your machine's local IP (e.g. 192.168.1.50)
#   3. docker compose -f docker-compose-hub.yml up -d
#   4. Open http://<your-local-ip>:3000   (printed by start.sh/start.ps1)

services:

  frontend:
    image: henrivs/nexus-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_API_URL=http://${HOST_IP:-localhost}:8088
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus

  backend:
    image: henrivs/nexus-backend:latest
    ports:
      - "8088:8000"
    env_file:
      - .env
    environment:
      - DOCKER_HOST=tcp://dockerproxy:2375
    volumes:
      - ./data:/app/data:z
      - ${OBSIDIAN_VAULT_PATH:-./data/vault}:/vault:ro
    depends_on:
      - dockerproxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - nexus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      VOLUMES: 1
      POST: 0
      DELETE: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - nexus
    restart: unless-stopped

  excalidraw:
    image: excalidraw/excalidraw:latest
    ports:
      - "3002:80"
    restart: unless-stopped
    networks:
      - nexus

networks:
  nexus:
    driver: bridge
